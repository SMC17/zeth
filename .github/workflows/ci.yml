name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    env:
      STRICT_VALIDATION: '1'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1

    - name: Prepare Validation Dependencies
      run: |
        mkdir -p artifacts
        pip3 install eth-py-evm
        if [ ! -d ethereum-tests/.git ]; then
          git clone --depth 1 https://github.com/ethereum/tests ethereum-tests
        fi
    
    - name: Run All Tests
      run: zig build test
    
    - name: Validate RLP Encoding
      run: |
        if [ -f ethereum-tests/RLPTests/rlptest.json ]; then
          zig build validate-rlp
        else
          echo "ethereum-tests vectors not available, skipping validate-rlp"
        fi
    
    - name: Validate RLP Decoding
      run: |
        if [ -f ethereum-tests/RLPTests/RandomRLPTests/example.json ] || [ -d ethereum-tests/RLPTests ]; then
          zig build validate-rlp-decode
        else
          echo "ethereum-tests vectors not available, skipping validate-rlp-decode"
        fi
    
    - name: Validate RLP Security
      run: |
        if [ -d ethereum-tests/RLPTests ]; then
          zig build validate-rlp-invalid
        else
          echo "ethereum-tests vectors not available, skipping validate-rlp-invalid"
        fi

    - name: Validate VMTests
      run: |
        if [ -d ethereum-tests/VMTests ]; then
          zig build validate-vm -- --summary-json artifacts/vmtest_summary.json
        else
          echo "ethereum-tests VMTests not available, skipping validate-vm (clone https://github.com/ethereum/tests ethereum-tests)"
          printf '{\n  "total": 0,\n  "passed": 0,\n  "failed": 0,\n  "tests_dir": "ethereum-tests",\n  "generated_at": 0,\n  "skipped": true\n}\n' > artifacts/vmtest_summary.json
        fi

    - name: Vector pipeline (convert + regression)
      run: |
        if [ -d ethereum-tests/VMTests ]; then
          zig build validate-vm -- --convert --out validation/test_vectors/generated.json
          if [ -f validation/test_vectors/generated.json ]; then
            zig build vector-run -- validation/test_vectors/generated.json
          fi
        else
          echo "Skipping vector pipeline (no ethereum-tests)"
        fi

    - name: Differential Fuzz
      run: |
        if python3 -c "import eth" 2>/dev/null; then
          zig build differential-fuzz -- 50 --no-fail
        else
          echo "PyEVM not available, skipping differential fuzz"
        fi

    - name: Run Reference Comparison Tests
      run: |
        zig build
        ./zig-out/bin/run_reference_tests \
          --discrepancy-out artifacts/zeth_discrepancies.txt \
          --discrepancy-json artifacts/zeth_discrepancies.json \
          --summary-json artifacts/reference_summary.json \
          --require-reference

    - name: Enforce Reference Discrepancy Baseline
      run: |
        zig build regression-gate -- validation/baselines/reference_discrepancies.json artifacts/zeth_discrepancies.json

    - name: Generate Opcode/Gas Report (JSON)
      run: |
        mkdir -p artifacts
        ./zig-out/bin/opcode_report --out artifacts/opcode_report.json
        jq '{
          generated_at_unix,
          summary: {
            total: .summary.precompile_total,
            passed: .summary.precompile_passed,
            failed: .summary.precompile_failed,
            reference_available: .summary.reference_available,
            reference_compared: .summary.reference_compared,
            reference_mismatches: .summary.reference_mismatches
          },
          precompiles: [
            .tests[]
            | select(.group == "precompile")
            | {
                name,
                precompile_id,
                pass,
                gas_used,
                expected_gas,
                gas_delta,
                compared_with_reference,
                reference_match,
                reference_gas,
                reference_gas_delta
              }
          ]
        }' artifacts/opcode_report.json > artifacts/precompile_differential_report.json

    - name: Enforce Opcode Regression Gate
      run: |
        jq -e '.summary.failed == 0' artifacts/opcode_report.json

    - name: Enforce Precompile Regression Gate
      run: |
        jq -e '.summary.precompile_failed == 0' artifacts/opcode_report.json

    - name: Enforce Differential Regression Gate
      run: |
        jq -e 'if .summary.reference_compared > 0 then (.summary.reference_mismatches == 0) else true end' artifacts/opcode_report.json

    - name: Enforce Validation Coverage Visibility
      run: |
        jq . artifacts/vmtest_summary.json
        jq . artifacts/reference_summary.json
        jq -e '.total > 0 and .failed == 0' artifacts/vmtest_summary.json
        jq -e '.reference_available == true and .tests_run > 0 and .discrepancy_count == 0' artifacts/reference_summary.json

    - name: Upload Opcode Report
      uses: actions/upload-artifact@v4
      with:
        name: opcode-report
        path: artifacts/opcode_report.json
        if-no-files-found: error

    - name: Upload Precompile Differential Report
      uses: actions/upload-artifact@v4
      with:
        name: precompile-differential-report
        path: artifacts/precompile_differential_report.json
        if-no-files-found: error

    - name: Upload Validation Summaries
      uses: actions/upload-artifact@v4
      with:
        name: validation-summaries
        path: |
          artifacts/vmtest_summary.json
          artifacts/reference_summary.json
          artifacts/zeth_discrepancies.json
          artifacts/zeth_discrepancies.txt
        if-no-files-found: error

  differential:
    name: Differential (Geth/PyEVM)
    runs-on: ubuntu-latest
    needs: test
    env:
      STRICT_VALIDATION: '1'

    steps:
    - uses: actions/checkout@v4

    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1

    - name: Install PyEVM
      run: pip3 install eth-py-evm

    - name: Build Reference Runner
      run: zig build

    - name: Detect Reference Availability
      id: refs
      run: |
        if python3 -c "import eth; from eth.vm.forks import BerlinVM" >/dev/null 2>&1 || command -v geth >/dev/null 2>&1; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Run Differential Tests
      if: steps.refs.outputs.available == 'true'
      run: |
        mkdir -p artifacts
        ./zig-out/bin/run_reference_tests \
          --discrepancy-out artifacts/zeth_discrepancies.txt \
          --discrepancy-json artifacts/zeth_discrepancies.json \
          --summary-json artifacts/reference_summary.json \
          --require-reference

    - name: Enforce Differential Baseline
      if: steps.refs.outputs.available == 'true'
      run: |
        zig build regression-gate -- validation/baselines/reference_discrepancies.json artifacts/zeth_discrepancies.json

    - name: Skip Differential Tests
      if: steps.refs.outputs.available != 'true'
      run: |
        echo "No reference implementation available; differential job skipped by gate."
        exit 1

    - name: Upload Discrepancy Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: differential-discrepancies
        path: |
          artifacts/zeth_discrepancies.txt
          artifacts/zeth_discrepancies.json
          artifacts/reference_summary.json
        if-no-files-found: ignore

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    
    - name: Check Formatting
      run: |
        if ! zig fmt --check .; then
          echo "Code not formatted. Run: zig fmt ."
          exit 1
        fi

    - name: Check Documentation Freshness
      run: ./scripts/check_docs_fresh.sh
    
    - name: Ast Check
      run: find src validation examples -name "*.zig" -exec zig ast-check {} \; || true

  build:
    name: Build All Targets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    
    - name: Build
      run: zig build

    - name: Build Examples
      run: |
        zig build run-counter || echo "Counter example build skipped"
        zig build run-storage || echo "Storage example build skipped"
        zig build run-arithmetic || echo "Arithmetic example build skipped"
        zig build run-events || echo "Events example build skipped"

  wasm:
    name: Build WASM Target
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    - name: Build zeth-wasm (wasm32-wasi)
      run: zig build wasm
    - name: Verify WASM artifact
      run: |
        test -f zig-out/lib/zeth_evm.wasm
        file zig-out/lib/zeth_evm.wasm

  riscv:
    name: Build RISC-V Target
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    - name: Build zeth-prove (riscv64-linux)
      run: zig build riscv
    - name: Verify RISC-V artifact
      run: |
        test -f zig-out/bin/zeth-riscv64
        file zig-out/bin/zeth-riscv64

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    - name: Run Benchmarks
      run: zig build bench || echo "Benchmarks completed"
