name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    
    - name: Run All Tests
      run: zig build test
    
    - name: Validate RLP Encoding
      run: |
        if [ -f ethereum-tests/RLPTests/rlptest.json ]; then
          zig build validate-rlp
        else
          echo "ethereum-tests vectors not available, skipping validate-rlp"
        fi
    
    - name: Validate RLP Decoding
      run: |
        if [ -f ethereum-tests/RLPTests/RandomRLPTests/example.json ] || [ -d ethereum-tests/RLPTests ]; then
          zig build validate-rlp-decode
        else
          echo "ethereum-tests vectors not available, skipping validate-rlp-decode"
        fi
    
    - name: Validate RLP Security
      run: |
        if [ -d ethereum-tests/RLPTests ]; then
          zig build validate-rlp-invalid
        else
          echo "ethereum-tests vectors not available, skipping validate-rlp-invalid"
        fi
    
    - name: Run Reference Comparison Tests
      run: |
        pip3 install eth-py-evm || echo "PyEVM not available, skipping reference tests"
        zig build
        ./zig-out/bin/run_reference_tests || echo "Reference tests skipped (PyEVM may not be available)"

    - name: Generate Opcode/Gas Report (JSON)
      run: |
        mkdir -p artifacts
        ./zig-out/bin/opcode_report --out artifacts/opcode_report.json
        jq '{
          generated_at_unix,
          summary: {
            total: .summary.precompile_total,
            passed: .summary.precompile_passed,
            failed: .summary.precompile_failed,
            reference_available: .summary.reference_available,
            reference_compared: .summary.reference_compared,
            reference_mismatches: .summary.reference_mismatches
          },
          precompiles: [
            .tests[]
            | select(.group == "precompile")
            | {
                name,
                precompile_id,
                pass,
                gas_used,
                expected_gas,
                gas_delta,
                compared_with_reference,
                reference_match,
                reference_gas,
                reference_gas_delta
              }
          ]
        }' artifacts/opcode_report.json > artifacts/precompile_differential_report.json

    - name: Enforce Opcode Regression Gate
      run: |
        jq -e '.summary.failed == 0' artifacts/opcode_report.json

    - name: Enforce Precompile Regression Gate
      run: |
        jq -e '.summary.precompile_failed == 0' artifacts/opcode_report.json

    - name: Enforce Differential Regression Gate
      run: |
        jq -e 'if .summary.reference_compared > 0 then (.summary.reference_mismatches == 0) else true end' artifacts/opcode_report.json

    - name: Upload Opcode Report
      uses: actions/upload-artifact@v4
      with:
        name: opcode-report
        path: artifacts/opcode_report.json
        if-no-files-found: error

    - name: Upload Precompile Differential Report
      uses: actions/upload-artifact@v4
      with:
        name: precompile-differential-report
        path: artifacts/precompile_differential_report.json
        if-no-files-found: error

  differential:
    name: Differential (Geth/PyEVM)
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1

    - name: Install PyEVM (best effort)
      run: pip3 install eth-py-evm || true

    - name: Build Reference Runner
      run: zig build

    - name: Detect Reference Availability
      id: refs
      run: |
        if python3 -c "import eth; from eth.vm.forks import BerlinVM" >/dev/null 2>&1 || command -v geth >/dev/null 2>&1; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Run Differential Tests
      if: steps.refs.outputs.available == 'true'
      run: ./zig-out/bin/run_reference_tests

    - name: Skip Differential Tests
      if: steps.refs.outputs.available != 'true'
      run: echo "No reference implementation available; differential job skipped by gate."

    - name: Upload Discrepancy Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: differential-discrepancies
        path: /tmp/zeth_discrepancies.txt
        if-no-files-found: ignore

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    
    - name: Check Formatting
      run: |
        if ! zig fmt --check .; then
          echo "Code not formatted. Run: zig fmt ."
          exit 1
        fi
    
    - name: Ast Check
      run: find src validation examples -name "*.zig" -exec zig ast-check {} \; || true

  build:
    name: Build All Targets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.14.1
    
    - name: Build
      run: zig build
    
    - name: Build Examples
      run: |
        zig build run-counter || echo "Counter example build skipped"
        zig build run-storage || echo "Storage example build skipped"
        zig build run-arithmetic || echo "Arithmetic example build skipped"
        zig build run-events || echo "Events example build skipped"
